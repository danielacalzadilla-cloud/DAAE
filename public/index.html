<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAAE · UPB Santa Cruz — Asistente Virtual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16233F;
    --ink-soft:#3A4A6B;
    --paper:#F7F4EC;
    --paper-raised:#FFFFFF;
    --card-border:#E4DCC5;
    --accent:#C08A28;
    --accent-soft:#EFDFB9;
    --accent-softer:#F7EFDA;
    --danger:#B23A34;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background: radial-gradient(circle at 15% 0%, #FFFDF7 0%, var(--paper) 45%);
    font-family:'IBM Plex Sans', sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
  }
  .app{
    width:100%;
    max-width:720px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:var(--paper);
  }
  header{
    padding:22px 20px 16px;
    border-bottom:1px solid var(--card-border);
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--paper);
    position:sticky;
    top:0;
    z-index:5;
  }
  .seal{
    flex:none;
    width:52px;
    height:52px;
    border-radius:50%;
    background:var(--ink);
    color:var(--paper);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:15px;
    border:2px solid var(--accent);
  }
  .headtext h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:20px;
    margin:0 0 2px;
  }
  .headtext p{
    margin:0;
    font-size:12.5px;
    color:var(--ink-soft);
    font-family:'IBM Plex Mono', monospace;
  }
  .status-dot{
    width:7px;height:7px;border-radius:50%;
    background:#3F8C5C;
    display:inline-block;
    margin-right:5px;
    box-shadow:0 0 0 3px rgba(63,140,92,0.15);
  }
  .chips{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:14px 20px;
    border-bottom:1px solid var(--card-border);
    scrollbar-width:none;
  }
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:none;
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    padding:7px 13px;
    border-radius:100px;
    border:1px solid var(--card-border);
    background:var(--paper-raised);
    color:var(--ink);
    cursor:pointer;
    transition:all .15s ease;
    white-space:nowrap;
  }
  .chip:hover{
    background:var(--accent-soft);
    border-color:var(--accent);
    transform:translateY(-1px);
  }
  .chat{
    flex:1;
    overflow-y:auto;
    padding:22px 20px 10px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .msg{
    max-width:82%;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .msg.user{align-self:flex-end; align-items:flex-end;}
  .msg.bot{align-self:flex-start; align-items:flex-start;}
  .bubble{
    padding:12px 15px;
    border-radius:var(--radius);
    font-size:14.5px;
    line-height:1.55;
    white-space:pre-wrap;
  }
  .msg.user .bubble{
    background:var(--ink);
    color:var(--paper);
    border-bottom-right-radius:4px;
  }
  .msg.bot .bubble{
    background:var(--paper-raised);
    border:1px solid var(--card-border);
    border-bottom-left-radius:4px;
  }
  .msg .label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    text-transform:uppercase;
    color:var(--ink-soft);
    padding:0 4px;
  }
  .bubble a{color:#8a611c; font-weight:600;}
  .typing{display:flex; gap:4px; padding:14px 15px;}
  .typing span{
    width:6px;height:6px;border-radius:50%;
    background:var(--ink-soft);
    opacity:.4;
    animation:blink 1.2s infinite;
  }
  .typing span:nth-child(2){animation-delay:.2s;}
  .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{ 0%,80%,100%{opacity:.25;} 40%{opacity:.9;} }
  .error-note{
    font-size:12.5px;
    color:var(--danger);
    background:#FBEAE9;
    border:1px solid #EFC7C4;
    padding:9px 12px;
    border-radius:10px;
  }
  form.inputbar{
    display:flex;
    gap:10px;
    padding:14px 20px 20px;
    border-top:1px solid var(--card-border);
    background:var(--paper);
  }
  form.inputbar input{
    flex:1;
    padding:13px 16px;
    border-radius:100px;
    border:1px solid var(--card-border);
    background:var(--paper-raised);
    font-family:'IBM Plex Sans', sans-serif;
    font-size:14.5px;
    color:var(--ink);
    outline:none;
  }
  form.inputbar input:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-softer);
  }
  form.inputbar button{
    flex:none;
    padding:0 20px;
    border-radius:100px;
    border:none;
    background:var(--ink);
    color:var(--paper);
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    cursor:pointer;
  }
  form.inputbar button:disabled{opacity:.45; cursor:default;}
  form.inputbar button:not(:disabled):hover{background:#0F1A30;}
  footer.tiny{
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    color:var(--ink-soft);
    padding:0 20px 16px;
  }
  @media (max-width:480px){
    .headtext h1{font-size:17px;}
    .msg{max-width:90%;}
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="seal">DAAE</div>
    <div class="headtext">
      <h1>Asistente DAAE</h1>
      <p><span class="status-dot"></span>UPB · Campus Santa Cruz</p>
    </div>
  </header>

  <div class="chips" id="chips"></div>
  <div class="chat" id="chat"></div>

  <form class="inputbar" id="form">
    <input id="input" type="text" placeholder="Escribe tu pregunta..." autocomplete="off" />
    <button id="sendBtn" type="submit">Enviar</button>
  </form>
  <footer class="tiny">Respuestas basadas en información oficial de DAAE · Verifica trámites importantes en UPBNet</footer>
</div>

<script>
const GREETING = "¡Hola! 👋 Soy el asistente virtual del área DAAE de la UPB Santa Cruz.\n\nPuedo ayudarte con dudas sobre becas, registros, orientación, empleabilidad, prácticas, clubes, inglés, titulación e internacionalización.\n\n¿En qué puedo ayudarte hoy?";

const CATEGORIES = [
  "Becas", "Registros", "Orientación", "Empleabilidad",
  "Prácticas Profesionales", "Deporte y Cultura", "Inglés",
  "Titulación", "Internacionalización"
];

let history = [];

const chatEl = document.getElementById('chat');
const chipsEl = document.getElementById('chips');
const form = document.getElementById('form');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

function linkify(text){
  const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return escaped.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function addMessage(role, text){
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = role === 'user' ? 'Tú' : 'DAAE';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = linkify(text);
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function addTyping(){
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing-indicator';
  const bubble = document.createElement('div');
  bubble.className = 'bubble typing';
  bubble.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping(){
  const el = document.getElementById('typing-indicator');
  if(el) el.remove();
}

async function sendMessage(text){
  if(!text.trim()) return;
  addMessage('user', text);
  history.push({role:'user', content: text});
  input.value = '';
  sendBtn.disabled = true;
  addTyping();

  try{
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await response.json();
    removeTyping();

    if(!response.ok){
      throw new Error(data.error || 'Error desconocido');
    }

    const reply = data.reply || "No pude generar una respuesta. Intenta de nuevo.";
    addMessage('bot', reply);
    history.push({role:'assistant', content: reply});
  }catch(err){
    removeTyping();
    const errDiv = document.createElement('div');
    errDiv.className = 'error-note';
    errDiv.textContent = 'Hubo un problema de conexión: ' + err.message;
    chatEl.appendChild(errDiv);
    chatEl.scrollTop = chatEl.scrollHeight;
  }finally{
    sendBtn.disabled = false;
  }
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  sendMessage(input.value);
});

CATEGORIES.forEach(cat => {
  const chip = document.createElement('button');
  chip.className = 'chip';
  chip.type = 'button';
  chip.textContent = cat;
  chip.addEventListener('click', () => sendMessage(`Tengo una pregunta sobre ${cat}`));
  chipsEl.appendChild(chip);
});

addMessage('bot', GREETING);
</script>
</body>
</html>
